<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar | HBOMax</title>

    <link rel="stylesheet" href="assets/css/signin.css">
</head>
<body>
    <nav class="menu">
        <a href="index.html" class="menu-logo">
        <img  class="menu-logo-image"  src="assets/images/logo-hbo.svg" alt="HBO Max"/>
        </a>
    <div>
        <a href="signin.html" class="menu-item">Entrar</a>

        <a href="#subscription" class="menu-item menu-item--button button">Assine Agora</a>
    </div> 
    </nav>

    <main class="content">
        <form class="login container">
            <h1 class="login-title">Entrar</h1>
            <label class="login-label"> Você tem uma conta da HBO Max?</label>
            <input 
              class="login-field"
              type="email"
              name="email"
              id="email"
              placeholder="Seu endereço de e-mail"
             />

            <input 
              class="login-field"
              type="password"
              name="password"
              id="password"
              placeholder="Sua senha"
              minlength="6"
            />

            <div class="login-actions">
                <button type="submit" class="button button--gradient">Entrar</button>
                <a href="#" class="login-link"> Esqueceu a senha?</a>
            </div>
        </form>
    </main>

     <footer class="footer container">
        <div>
            <a class="footer-link" href="https://www.hbomax.com/br/pt/sitemap">AGORA NA HBO MAX</a>
            <a class="footer-link" href="https://www.hbomax.com/br/pt/coming-soon">EM BREVE</a>
            <a class="footer-link" href="https://www.hbomax.com/br/pt/feature">FILMES EM DESTAQUE</a>
            <a class="footer-link" href="https://www.hbomax.com/br/pt/series">SÉRIES</a>
            <a class="footer-link" href="https://help.hbomax.com/br">AJUDA</a>
        </div>

        <p class="text--small footer-info">"© 2026 WarnerMedia Direct Latin America, LLC. Todos os direitos reservados. HBO Max é usado sob licença."</p>

        <div class="footer-social">

            <a href="https://www.facebook.com/HBOMaxBr/" class="footer-social-link">
                <img src="assets/images/facebook.png" alt="Facebook">
            </a>
            <a href="https://www.instagram.com/hbomaxbr/" class="footer-social-link">
                <img src="assets/images/instagram.png" alt="Instagram">
            </a>
            <a href="https://www.youtube.com/c/hbomaxbr" class="footer-social-link">
                <img src="assets/images/youtube.png" alt="Youtube">
            </a>
            

        </div>
    </footer>   
</body>
